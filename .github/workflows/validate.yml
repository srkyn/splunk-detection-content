name: Validate Detection Content

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate detection writeups
        run: python scripts/validate_queries.py

      - name: Install Sigma validation dependencies
        run: python -m pip install pyyaml

      - name: Validate Sigma rules
        run: python scripts/validate_sigma.py
