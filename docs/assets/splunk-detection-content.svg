<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Splunk Detection Content project banner</title>
  <desc id="desc">Minimal blue-team detection engineering banner with search, evidence, triage, and MITRE ATTACK mapping.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06130f"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="signal" x1="120" y1="160" x2="1000" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#e5e7eb" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g transform="translate(92 88)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="6" fill="#38bdf8">SOC CONTENT</text>
    <text x="0" y="82" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="900" fill="#f8fafc">Splunk Detection</text>
    <text x="0" y="146" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="850" fill="#f8fafc">Content</text>
    <rect x="0" y="180" width="450" height="3" fill="url(#signal)"/>
    <text x="0" y="236" font-family="Inter, Arial, sans-serif" font-size="27" fill="#cbd5e1">SPL · MITRE ATT&amp;CK · Windows</text>
    <text x="0" y="280" font-family="Inter, Arial, sans-serif" font-size="27" fill="#cbd5e1">Noise notes · analyst pivots</text>
  </g>

  <g transform="translate(715 130)" font-family="Consolas, 'Courier New', monospace">
    <rect x="0" y="0" width="390" height="360" rx="18" fill="#020617" stroke="#334155" stroke-width="2"/>
    <rect x="0" y="0" width="390" height="48" rx="18" fill="#0f172a"/>
    <circle cx="28" cy="24" r="7" fill="#ef4444"/>
    <circle cx="52" cy="24" r="7" fill="#facc15"/>
    <circle cx="76" cy="24" r="7" fill="#22c55e"/>
    <text x="26" y="86" font-size="18" fill="#22c55e">index=wineventlog</text>
    <text x="26" y="122" font-size="18" fill="#38bdf8">| stats count by user host</text>
    <text x="26" y="158" font-size="18" fill="#facc15">| sort - count</text>
    <path d="M30 216H344" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <path d="M30 258H258" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <path d="M30 300H308" stroke="#facc15" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(92 520)">
    <circle cx="0" cy="0" r="15" fill="#22c55e"/>
    <circle cx="40" cy="0" r="15" fill="#38bdf8"/>
    <circle cx="80" cy="0" r="15" fill="#facc15"/>
    <text x="122" y="8" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#f8fafc" letter-spacing="3">BEHAVIOR FIRST</text>
  </g>
</svg>
